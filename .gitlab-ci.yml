# GitLab CI Pipeline — explicit stages so each quality gate is independently
# visible (format / lint / type_check / test / coverage), matching what
# compliance scanners look for stage-by-stage rather than bundled jobs.

stages:
  - lint
  - format
  - type_check
  - test
  - coverage

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  paths:
    - .cache/pip

default:
  image: python:3.11-slim
  before_script:
    - apt-get update -qq && apt-get install -y -qq build-essential curl libpq-dev libmagic1 poppler-utils tesseract-ocr > /dev/null
    - cd backend
    - pip install -q -r requirements.txt
    - pip install -q -r requirements-dev.txt

lint:
  stage: lint
  script:
    - ruff check app/ --config pyproject.toml

format:
  stage: format
  script:
    - ruff format --check app/ --config pyproject.toml

type_check:
  stage: type_check
  script:
    - mypy app/ --config-file pyproject.toml

test:
  stage: test
  script:
    - python -m pytest

coverage:
  stage: coverage
  script:
    - python -m pytest --cov=app --cov-report=term --cov-report=xml --cov-fail-under=40
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: backend/coverage.xml
