# GitLab CI Pipeline — adds a quality stage (bandit, pylint, vulture, flake8)
# on top of lint/format/type_check/test/coverage/audit.

stages:
  - lint
  - format
  - type_check
  - quality
  - test
  - coverage
  - audit

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  paths:
    - .cache/pip

default:
  image: python:3.11-slim
  before_script:
    - apt-get update -qq && apt-get install -y -qq build-essential curl libpq-dev libmagic1 poppler-utils tesseract-ocr > /dev/null
    - cd backend
    - pip install -q -r requirements.txt
    - pip install -q -r requirements-dev.txt

lint:
  stage: lint
  script:
    - ruff check app/ --config pyproject.toml

format:
  stage: format
  script:
    - ruff format --check app/ --config pyproject.toml

type_check:
  stage: type_check
  script:
    - mypy app/ --config-file pyproject.toml

quality:
  stage: quality
  script:
    - bandit -c pyproject.toml -r app/ || true
    - vulture app/ --min-confidence 80 || true
    - flake8 app/ --max-line-length=110 --extend-ignore=E203,E501,W503 || true
    - pylint app/ --rcfile=pyproject.toml || true
  allow_failure: true

test:
  stage: test
  script:
    - python -m pytest

coverage:
  stage: coverage
  script:
    - python -m pytest --cov=app --cov-report=term --cov-report=xml --cov-fail-under=40
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: backend/coverage.xml

dependency_audit:
  stage: audit
  script:
    - pip install -q pip-audit
    - pip-audit -r requirements.txt --desc || true
  allow_failure: true

changelog:
  stage: audit
  image: orhunp/git-cliff:latest
  script:
    - git-cliff -o CHANGELOG.md
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  allow_failure: true
