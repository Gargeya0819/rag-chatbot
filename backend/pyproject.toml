[tool.ruff]
line-length = 110
target-version = "py311"
exclude = ["tests/fixtures"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "I",   # isort (import sorting)
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
]
ignore = [
    "E501",  # line too long (handled by formatter)
    "B008",  # FastAPI's Depends()/File() in defaults is the correct DI pattern, not a bug
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
warn_unused_ignores = true
warn_redundant_casts = true
no_implicit_optional = true
check_untyped_defs = true
disallow_untyped_defs = false
exclude = ["tests/", "lightweight/llm_local.py"]

[[tool.mypy.overrides]]
module = ["llama_cpp.*", "pymupdf4llm.*", "fitz.*", "sentence_transformers.*"]
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
addopts = "-v --tb=short"

[tool.bandit]
exclude_dirs = ["tests", ".venv"]
skips = ["B101"]  # B101 = assert used (fine in our codebase, including tests)

[tool.vulture]
min_confidence = 80
paths = ["app"]
exclude = ["tests/"]

[tool.pylint.main]
disable = [
    "C0114", "C0115", "C0116",  # missing docstrings — many already covered by code comments
    "R0903",                     # too-few-public-methods — common for Pydantic schemas
    "W0718",                     # broad-exception-caught — intentional for graceful degradation in RAG pipeline
    "W1203",                     # logging-fstring-interpolation — f-strings preferred for readability here
    "C0415",                     # import-outside-toplevel — intentional lazy imports for optional heavy ML deps
    "W0603",                     # global-statement — intentional for module-level singleton caching
]
max-line-length = 110
