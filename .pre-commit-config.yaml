# Full .pre-commit-config.yaml with all quality/security linters added.
# This REPLACES your existing .pre-commit-config.yaml entirely.

repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
        name: gitleaks (secret scanning)

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff-format
        name: ruff-format (formatting)
        args: ["--config", "backend/pyproject.toml"]
        files: ^backend/
      - id: ruff
        name: ruff (linting)
        args: ["--fix", "--config", "backend/pyproject.toml"]
        files: ^backend/

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        name: mypy (type checking)
        args: ["--config-file", "backend/pyproject.toml"]
        files: ^backend/app/
        additional_dependencies:
          - pydantic==2.10.3
          - fastapi==0.115.5
          - sqlalchemy==2.0.36

  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.10
    hooks:
      - id: bandit
        name: bandit (security static analysis)
        args: ["-c", "backend/pyproject.toml"]
        files: ^backend/app/
        additional_dependencies: ["bandit[toml]"]

  - repo: https://github.com/jendrikseipp/vulture
    rev: v2.13
    hooks:
      - id: vulture
        name: vulture (dead code detection)
        args: ["backend/app", "--min-confidence", "80"]

  - repo: https://github.com/pycqa/flake8
    rev: 7.1.1
    hooks:
      - id: flake8
        name: flake8 (style checking)
        files: ^backend/app/
        args: ["--max-line-length=110", "--extend-ignore=E203,E501,W503"]

  - repo: https://github.com/asottile/pyupgrade
    rev: v3.18.0
    hooks:
      - id: pyupgrade
        name: pyupgrade (modernize syntax)
        args: ["--py311-plus"]
        files: ^backend/app/

  - repo: https://github.com/pylint-dev/pylint
    rev: v3.3.1
    hooks:
      - id: pylint
        name: pylint (code analysis)
        args: ["--rcfile=backend/pyproject.toml"]
        files: ^backend/app/
        additional_dependencies: ["fastapi", "pydantic", "sqlalchemy", "httpx", "sentence-transformers"]

  - repo: https://github.com/returntocorp/semgrep
    rev: v1.96.0
    hooks:
      - id: semgrep
        name: semgrep (pattern-based security scanning)
        args: ["--config=auto", "--error"]
        files: ^backend/app/
        additional_dependencies: ["setuptools<81"]

  - repo: local
    hooks:
      - id: pytest
        name: pytest (unit tests)
        entry: bash -c 'docker-compose exec -T backend python -m pytest'
        language: system
        pass_filenames: false
        always_run: true
