repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff-format
        name: ruff-format (formatting)
        args: ["--config", "backend/pyproject.toml"]
        files: ^backend/
      - id: ruff
        name: ruff (linting)
        args: ["--fix", "--config", "backend/pyproject.toml"]
        files: ^backend/

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        name: mypy (type checking)
        args: ["--config-file", "backend/pyproject.toml"]
        files: ^backend/app/
        additional_dependencies:
          - pydantic==2.10.3
          - fastapi==0.115.5
          - sqlalchemy==2.0.36

  - repo: local
    hooks:
      - id: pytest
        name: pytest (unit tests)
        entry: bash -c 'docker-compose exec -T backend python -m pytest'
        language: system
        pass_filenames: false
        always_run: true
